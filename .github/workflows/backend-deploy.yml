name: OmniSense Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'

env:
  ACR_NAME: 77security
  IMAGE_NAME: omnisense-api
  CLUSTER_NAME: 77security
  RESOURCE_GROUP: Resourcegroup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} src/backend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install omnisense ./src/backend/helm/omnisense \
            --set image.tag=${{ github.sha }}
