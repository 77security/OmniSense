apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "omnisense.fullname" . }}-background-job
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: job
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: IfNotPresent
              command: ["node", "src/worker.js"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.env.databaseUrlSecretName }}
                      key: {{ .Values.env.databaseUrlSecretKey }}
                - name: URLHAUS_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.env.urlhausSecretName }}
                      key: {{ .Values.env.urlhausSecretKey }}
          restartPolicy: OnFailure
